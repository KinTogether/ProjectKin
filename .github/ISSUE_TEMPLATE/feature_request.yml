name: Feature proposal
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before proposing a feature, please confirm it aligns with the [README](../../README.md) principles.
        Features that conflict with the core philosophy will not be accepted, regardless of how clever they are.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Philosophy check
      options:
        - label: This feature does not introduce dark patterns, engagement loops, or urgency mechanics.
          required: true
        - label: This feature does not require storing or transmitting face photos.
          required: true
        - label: This feature does not monetize loneliness or pay-to-be-seen behavior.
          required: true
